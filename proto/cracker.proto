syntax = "proto3";

package cracker;

// This will ensure Go knows where to generate the files
option go_package = "github.com/yourname/distributed-cracker/proto";

service CrackerService {
    // The Manager calls this on the Worker
    rpc ProcessTask(TaskRequest) returns (TaskResponse);
}

message TaskRequest {
    string target_hash = 1;
    string start_range = 2;
    string end_range = 3;
    string alphabet = 4; // example "abcdefghijklmnopqrstuvwxyz"
}

message TaskResponse {
    bool found = 1;
    string password = 2; // Only populated if found is true
}